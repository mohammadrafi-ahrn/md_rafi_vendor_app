<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .app-card { max-width: 300px; margin: 20px auto; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .upload-area { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .upload-area:hover { border-color: #24A1DE; background: #f0f9ff; }
        
        /* Vendor Circle Style */
        .vendor-badge {
            width: 45px;
            height: 45px;
            background: #24A1DE;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }
        .vendor-badge:active { transform: scale(0.9); }
        
        /* Tooltip Style */
        .tooltip {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -40px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            white-space: nowrap;
        }
        .vendor-badge:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
</head>

<body>

    <div class="app-card shadow-2xl">
        <div class="bg-[#24A1DE] p-4 text-center text-white relative">
            <h1 class="text-lg font-bold uppercase tracking-wide">New Refrigeration India</h1>
            <p class="text-[10px] opacity-90">Authorized Samsung Service Center</p>
        </div>

        <div class="flex flex-col items-center -mt-4">
            <div class="vendor-badge shadow-md" id="vendorCircle" onclick="alertVendor()">
                <span id="vendorInitial">?</span>
                <span class="tooltip" id="vendorTooltip">Unknown Vendor</span>
            </div>
            <p class="text-[11px] text-gray-500 mt-1 font-semibold" id="vendorLabel">Loading...</p>
        </div>

        <div class="p-4 space-y-4 pt-2">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">CALL ID NUMBER</label>
                <input type="text" id="manualCallId" placeholder="Enter ID..."
                    class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition text-sm"
                   oninput="validateAndSync(this)">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">INSTALLATION PHOTOS</label>
                <div class="upload-area rounded-xl p-4 text-center relative cursor-pointer">
                    <input type="file" id="imageFiles" multiple accept="image/*"
                        class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleFileSelect()">
                    <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p id="fileStatus" class="mt-1 text-[11px] text-gray-500">Tap to select photos</p>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">CUSTOMER INVOICE (PDF)</label>
                <div class="upload-area rounded-xl p-4 text-center relative cursor-pointer">
                    <input type="file" id="pdfFile" accept="application/pdf"
                        class="absolute inset-0 opacity-0 cursor-pointer" onchange="handlePdfSelect()">
                    <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <p id="pdfLabel" class="mt-1 text-[11px] text-gray-500">📄 Tap to add PDF (Optional)</p>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">FEEDBACK VIDEO (MAX 10MB)</label>
                <div class="upload-area rounded-xl p-4 text-center relative cursor-pointer">
                    <input type="file" id="videoFile" accept="video/*"
                        class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleVideoSelect()">
                    <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <p id="videoLabel" class="mt-1 text-[11px] text-gray-500">🎥 Tap to add Video (Optional)</p>
                </div>
            </div>

            <div class="hidden">
                <input type="text" id="autoCallId" readonly>
            </div>

            <button onclick="sendData()" id="submitBtn"
                class="mt-4 w-full bg-[#24A1DE] hover:bg-[#1d86ba] text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="btnText">SEND FEEDBACK</span>
            </button>
        </div>
    </div>

    <script>

        function validateAndSync(inputElement) {
    // 1. सिर्फ नंबर्स (0-9) को छोड़कर बाकी सब कुछ (Letters, Symbols, Spaces) हटा देगा
    inputElement.value = inputElement.value.replace(/[^0-9]/g, '');
    
    const autoCallId = document.getElementById('autoCallId');
    if (autoCallId) {
        autoCallId.value = inputElement.value;
    }
}
        const BOT_TOKEN = '8663616668:AAEV6r-gjE8gEHHqve2O7FScdQTYR1Bbylk'; 
        const vendorConfig = {
            "v1_achal" : "-1003976175925",
            "v2_sultan" : "-1003955371049",
            "v3_tajib" : "-1003861702933",
            "v4_kasim" : "-1003721490100",
            "v5_faheem" : "-1003756053404",
            "v6_shyamu" : "-1003225567960",
            "v7_gurpreet" : "-1003905300533",
            "v8_ashfaq" : "-1003979197120",
            "v9_zameer" : "-1003668891627",
            "v10_shaqib" : "-1003980380666",
            "v11_irfan" : "-1003955427060"
        };

        const params = new URLSearchParams(window.location.search);
        const vendorKey = params.get('v') || 'default';
        const CHAT_ID = vendorConfig[vendorKey];

        // UI Setup for Vendor Circle
        if (vendorKey !== 'default') {
            const cleanName = vendorKey.split('_')[1] || vendorKey;
            document.getElementById('vendorInitial').innerText = cleanName.charAt(0).toUpperCase();
            document.getElementById('vendorTooltip').innerText = "Vendor: " + cleanName.toUpperCase();
            document.getElementById('vendorLabel').innerText = cleanName.toUpperCase();
        }

        function alertVendor() {
            const cleanName = vendorKey.split('_')[1] || vendorKey;
            alert("Logged in as: " + cleanName.toUpperCase());
        }

        function syncCallId() {
            document.getElementById('autoCallId').value = document.getElementById('manualCallId').value;
        }

        // Image Selection UI Update
        function handleFileSelect() {
            const files = document.getElementById('imageFiles').files;
            const status = document.getElementById('fileStatus');
            if (files.length > 0) {
                status.innerText = "✅ " + files.length + " Photos Ready";
                status.classList.remove('text-gray-500');
                status.classList.add('text-green-600', 'font-bold');
            }
        }

        // PDF Selection UI Update
        function handlePdfSelect() {
            const file = document.getElementById('pdfFile').files[0];
            const label = document.getElementById('pdfLabel');
            if (file) {
                label.innerText = "✅ PDF: " + file.name.substring(0, 15) + "...";
                label.classList.remove('text-gray-500');
                label.classList.add('text-green-600', 'font-bold');
            }
        }

        // Video Selection UI Update
        function handleVideoSelect() {
            const file = document.getElementById('videoFile').files[0];
            const label = document.getElementById('videoLabel');
            if (file) {
                // Size Check (10MB Limit)
                if (file.size > 10 * 1024 * 1024) {
                    alert("Video size is greater than 10MB! Please select a smaller video.");
                    document.getElementById('videoFile').value = ""; // reset
                    return;
                }
                label.innerText = "✅ Video: " + file.name.substring(0, 15) + "...";
                label.classList.remove('text-gray-500');
                label.classList.add('text-green-600', 'font-bold');
            }
        }

        async function sendData() {
            const callId = document.getElementById('manualCallId').value;
            const files = document.getElementById('imageFiles').files;
            const pdfFile = document.getElementById('pdfFile').files[0];
            const videoFile = document.getElementById('videoFile').files[0];
            const btn = document.getElementById('submitBtn');

            if (!CHAT_ID) return alert("Invalid Vendor Link!");
            if (!callId) return alert("Please enter Call ID");
            if (files.length === 0) return alert("Please select photos");

            btn.disabled = true;
            btn.innerHTML = `<span>Sending Data...</span>`;

            try {
                // 1. Text Message Send Karna
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `<b>🔔 NEW INSTALLATION</b>\n<b>👤 Vendor:</b> ${vendorKey.toUpperCase()}\n<b>🆔 Call ID:</b> ${callId}`,
                        parse_mode: 'HTML'
                    })
                });

                // 2. Multiple Photos Send Karna
                for (let i = 0; i < files.length; i++) {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', files[i]);
                    formData.append('caption', `ID: ${callId} (Photo ${i+1}/${files.length})`);
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                }

                // 3. Customer Invoice PDF Send Karna (Agar select kiya ho)
                if (pdfFile) {
                    btn.innerHTML = `<span>Uploading PDF...</span>`;
                    const pdfData = new FormData();
                    pdfData.append('chat_id', CHAT_ID);
                    pdfData.append('document', pdfFile);
                    pdfData.append('caption', `📄 Invoice PDF for Call ID: ${callId}`);
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: pdfData });
                }

                // 4. Feedback Video Send Karna (Agar select kiya ho)
                if (videoFile) {
                    btn.innerHTML = `<span>Uploading Video...</span>`;
                    const videoData = new FormData();
                    videoData.append('chat_id', CHAT_ID);
                    videoData.append('video', videoFile);
                    videoData.append('caption', `🎥 Feedback Video for Call ID: ${callId}`);
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: videoData });
                }

                alert("Feedback Sent Successfully with all files!");
                location.reload();
            } catch (e) {
                alert("Error! Check connection or file sizes.");
                btn.disabled = false;
                btn.innerHTML = `<span>SEND FEEDBACK</span>`;
            }
        }
    </script>
</body>

</html>
