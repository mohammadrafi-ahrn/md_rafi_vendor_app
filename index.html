<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRI Vendor Reporting App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .app-card { max-width: 350px; margin: 20px auto; background: white; border-radius: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .upload-box { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-box:hover { border-color: #24A1DE; background: #f0f9ff; }
        .vendor-badge { width: 50px; height: 50px; background: #24A1DE; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-top: -25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <!-- Header -->
    <div class="bg-[#24A1DE] p-5 text-center text-white">
        <h1 class="text-lg font-bold tracking-wider">NEW REFRIGERATION INDIA</h1>
        <p class="text-[10px] opacity-80 uppercase">Samsung Authorized Service Partner</p>
    </div>

    <!-- Vendor Profile -->
    <div class="flex flex-col items-center mb-4">
        <div class="vendor-badge" id="vCircle">?</div>
        <p class="text-xs text-gray-500 mt-1 font-bold" id="vName">IDENTIFYING...</p>
    </div>

    <div class="p-5 space-y-5">
        <!-- Call ID -->
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Call ID Number</label>
            <input type="text" id="callId" placeholder="Ex: 4434984667" 
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#24A1DE] text-sm">
        </div>

        <!-- 1. Photos Upload -->
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Installation Photos (Multiple)</label>
            <div class="upload-box">
                <input type="file" id="photoFiles" accept="image/*" multiple onchange="updateLabel('photoFiles', 'photoLabel')">
                <p id="photoLabel" class="text-xs text-gray-500">📸 Tap to add Photos</p>
            </div>
        </div>

        <!-- 2. PDF Upload (Optional) -->
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Customer Invoice (PDF)</label>
            <div class="upload-box">
                <input type="file" id="pdfFile" accept="application/pdf" onchange="updateLabel('pdfFile', 'pdfLabel')">
                <p id="pdfLabel" class="text-xs text-gray-500">📄 Tap to add PDF (Optional)</p>
            </div>
        </div>

        <!-- 3. Video Upload (Optional) -->
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Feedback Video (Max 10MB)</label>
            <div class="upload-box">
                <input type="file" id="videoFile" accept="video/*" onchange="updateLabel('videoFile', 'videoLabel')">
                <p id="videoLabel" class="text-xs text-gray-500">🎥 Tap to add Video</p>
            </div>
        </div>

        <!-- Submit Button -->
        <button onclick="processSubmission()" id="submitBtn"
            class="w-full bg-[#24A1DE] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-[#1d86ba] active:scale-95 transition-all">
            SUBMIT REPORT
        </button>
    </div>
</div>

<script>
    const BOT_TOKEN = '8663616668:AAEV6r-gjE8gEHHqve2O7FScdQTYR1Bbylk';
    const vendorConfig = {
        "v1_achal": "-1003976175925", "v2_sultan": "-1003955371049",
        "v3_tajib": "-1003861702933", "v4_kasim": "-1003721490100",
        "v5_faheem": "-1003756053404", "v6_shyamu": "-1003225567960",
        "v7_gurpreet": "-1003905300533", "v8_ashfaq": "-1003979197120",
        "v9_zameer": "-1003668891627", "v10_shaqib": "-1003980380666",
        "v11_irfan": "-1003955427060"
    };

    const params = new URLSearchParams(window.location.search);
    const vendorKey = params.get('v') || 'default';
    const CHAT_ID = vendorConfig[vendorKey];

    // Initialize UI
    if (vendorKey !== 'default') {
        const name = vendorKey.split('_')[1].toUpperCase();
        document.getElementById('vCircle').innerText = name.charAt(0);
        document.getElementById('vName').innerText = "LOGGED IN: " + name;
    }

    function updateLabel(inputId, labelId) {
        const input = document.getElementById(inputId);
        const label = document.getElementById(labelId);
        if (input.files.length > 0) {
            label.innerText = "✅ " + (input.files.length > 1 ? input.files.length + " Files Selected" : input.files[0].name);
            label.style.color = "#16a34a";
        }
    }

    async function processSubmission() {
        const id = document.getElementById('callId').value;
        const photos = document.getElementById('photoFiles').files;
        const pdf = document.getElementById('pdfFile').files[0];
        const video = document.getElementById('videoFile').files[0];
        const btn = document.getElementById('submitBtn');

        if (!CHAT_ID) return alert("Error: Link invalid!");
        if (!id) return alert("Please enter Call ID");
        if (photos.length === 0) return alert("Please select installation photos");

        btn.disabled = true;
        btn.innerText = "Uploading... Please wait";

        try {
            // 1. Send Text Info
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `<b>🔔 NEW JOB DONE</b>\n<b>🆔 Call ID:</b> ${id}\n<b>👤 Vendor:</b> ${vendorKey.toUpperCase()}`,
                    parse_mode: 'HTML'
                })
            });

            // 2. Send Photos
            for (let i = 0; i < photos.length; i++) {
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', photos[i]);
                fd.append('caption', `Photo ${i+1} for ID: ${id}`);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }

            // 3. Send PDF (If exists)
            if (pdf) {
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('document', pdf);
                fd.append('caption', `📄 INVOICE - ID: ${id}`);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd });
            }

            // 4. Send Video (If exists)
            if (video) {
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('video', video);
                fd.append('caption', `🎥 FEEDBACK VIDEO - ID: ${id}`);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: fd });
            }

            alert("All files sent successfully!");
            location.reload();
        } catch (err) {
            alert("Error sending files. Check internet.");
            btn.disabled = false;
            btn.innerText = "SUBMIT REPORT";
        }
    }
</script>
</body>
</html>
